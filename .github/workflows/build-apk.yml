name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: 准备 Web 资源到 www 目录
        run: |
          mkdir -p www
          cp index.html manifest.json www/
          cp -r css js www/

      - name: 同步 Capacitor Android 项目
        run: |
          npx cap add android
          npx cap sync android

      # ★ 检查是否有固定签名密钥的 Secret
      - name: 检查签名密钥
        id: check_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "检测到固定签名密钥"
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "未检测到固定签名密钥，将生成新密钥"
          fi

      # ★ 签名密钥：优先使用 GitHub Secret 中存储的固定密钥
      - name: 准备签名密钥
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ "$KEYSTORE_BASE64" != "" ]; then
            echo "使用 GitHub Secret 中的固定签名密钥"
            echo "$KEYSTORE_BASE64" | base64 -d > android/wenfeng.keystore
          else
            echo "首次构建：生成新的签名密钥（请保存为 GitHub Secret: KEYSTORE_BASE64）"
            keytool -genkey -v \
              -keystore android/wenfeng.keystore \
              -alias wenfeng \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass wenfeng123 \
              -keypass wenfeng123 \
              -dname "CN=Ziya, OU=App, O=Ziya, L=Beijing, ST=Beijing, C=CN"
            # 上传密钥的 base64 编码，方便用户保存为 Secret
            KEYSTORE_B64=$(base64 -w 0 android/wenfeng.keystore)
            echo "KEYSTORE_BASE64=$KEYSTORE_B64" > keystore_info.txt
            echo "===== 重要：请将以下内容保存为 GitHub Secret (KEYSTORE_BASE64) ====="
            echo "$KEYSTORE_B64"
            echo "==================================================================="
          fi

      - name: 生成 Gradle 签名配置
        run: |
          cat > android/app/signing.gradle << 'GRADLE_EOF'
          android {
            signingConfigs {
              release {
                storeFile file("../wenfeng.keystore")
                storePassword "wenfeng123"
                keyAlias "wenfeng"
                keyPassword "wenfeng123"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
              }
            }
          }
          GRADLE_EOF

          # 引用签名配置
          sed -i '/apply plugin: .com.android.application./a apply from: "signing.gradle"' android/app/build.gradle

      - name: 生成版本号
        run: |
          VERSION="v5.1-$(date +%Y%m%d)"
          echo "VERSION_TAG=$VERSION" >> $GITHUB_ENV
          echo "版本号: $VERSION"

      - name: 构建 APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 重命名 APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/ziya-shouzhang-${{ env.VERSION_TAG }}.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ziya-shouzhang-${{ env.VERSION_TAG }}
          path: android/app/build/outputs/apk/release/ziya-shouzhang-${{ env.VERSION_TAG }}.apk

      # 首次构建时上传密钥信息（如果 Secret 不存在）
      - name: 上传密钥信息（仅首次）
        if: steps.check_keystore.outputs.has_keystore == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: keystore-info
          path: keystore_info.txt
