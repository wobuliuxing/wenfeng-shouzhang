name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: 同步 Capacitor Android 项目
        run: npx cap add android

      - name: 创建签名密钥
        run: |
          keytool -genkey -v \
            -keystore android/wenfeng.keystore \
            -alias wenfeng \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass wenfeng123 \
            -keypass wenfeng123 \
            -dname "CN=Wenfeng, OU=App, O=Wenfeng, L=Beijing, ST=Beijing, C=CN"

      - name: 生成 Gradle 签名配置
        run: |
          cat > android/app/signing.gradle << 'GRADLE_EOF'
          android {
            signingConfigs {
              release {
                storeFile file("../wenfeng.keystore")
                storePassword "wenfeng123"
                keyAlias "wenfeng"
                keyPassword "wenfeng123"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
              }
            }
          }
          GRADLE_EOF

          # 引用签名配置
          sed -i '/apply plugin: .com.android.application./a apply from: "signing.gradle"' android/app/build.gradle

      - name: 生成版本号
        run: |
          VERSION="v2.1.0-$(date +%Y%m%d)"
          echo "VERSION_TAG=$VERSION" >> $GITHUB_ENV
          echo "版本号: $VERSION"

      - name: 构建 APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 重命名 APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/wenfeng-shouzhang-${{ env.VERSION_TAG }}.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: wenfeng-shouzhang-${{ env.VERSION_TAG }}
          path: android/app/build/outputs/apk/release/wenfeng-shouzhang-${{ env.VERSION_TAG }}.apk
